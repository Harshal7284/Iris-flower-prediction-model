<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iris Flower Classifier</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .ui-card {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 26px;
        }
        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 18px;
        }
        .form-group {
            flex: 1;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #5a738e;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eaeaea;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            color: #2c3e50;
            background-color: #fcfcfc;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #3498db;
            background-color: #ffffff;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.2);
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #27ae60;
        }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 0.5px;
            animation: fadeIn 0.4s ease-in-out;
        }
        .setosa {
            background-color: #e8f8f5;
            color: #117a65;
            border: 1px solid #a3e4d7;
        }
        .versicolor {
            background-color: #fef9e7;
            color: #b7950b;
            border: 1px solid #f9e79f;
        }
        .virginica {
            background-color: #f5eeeb;
            color: #a04000;
            border: 1px solid #edbb99;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="ui-card">
    <h2>Iris Species Predictor</h2>
    <form action="/predict" method="POST">
        
        <div class="form-row">
            <div class="form-group">
                <label for="SepalLengthCm">Sepal Length (cm)</label>
                <input type="number" step="0.1" name="SepalLengthCm" id="SepalLengthCm" placeholder="e.g. 5.1" required>
            </div>
            <div class="form-group">
                <label for="SepalWidthCm">Sepal Width (cm)</label>
                <input type="number" step="0.1" name="SepalWidthCm" id="SepalWidthCm" placeholder="e.g. 3.5" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="PetalLengthCm">Petal Length (cm)</label>
                <input type="number" step="0.1" name="PetalLengthCm" id="PetalLengthCm" placeholder="e.g. 1.4" required>
            </div>
            <div class="form-group">
                <label for="PetalWidthCm">Petal Width (cm)</label>
                <input type="number" step="0.1" name="PetalWidthCm" id="PetalWidthCm" placeholder="e.g. 0.2" required>
            </div>
        </div>

        <button type="submit">Classify Flower Specimen</button>
    </form>

    {% if prediction_text %}
        <div class="result-box {% if 'setosa' in prediction_text %}setosa{% elif 'versicolor' in prediction_text %}versicolor{% else %}virginica{% endif %}">
            {{ prediction_text }}
        </div>
    {% endif %}
</div>

</body>
</html>
